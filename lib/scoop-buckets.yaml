version: '3'

tasks:
  add:
    aliases: [ ensure ]
    vars:
      SCOOP_HOME: '{{ default (env "USERPROFILE") (env "HOME") | replace "\\" "/" }}/scoop'
    requires:
      vars: [ BUCKET ]
    status:
      - test -d "{{ .SCOOP_HOME }}/buckets/{{ .BUCKET }}"
    cmds:
      - |
        {{ if .BUCKET_URL }}
        scoop bucket add {{ .BUCKET }} {{ .BUCKET_URL }}
        {{ else }}
        scoop bucket add {{ .BUCKET }}
        {{ end }}
        if ! [ "{{ .UNATTENDED }}" = "true" ]; then
          {{ .gum_ok }} " ✅ Scoop bucket {{ .BUCKET }} has been added successfully."
        fi

  list:
    - scoop bucket list

  remove:
    deps: [ "::tools:coreutils:install" ]
    requires:
      vars: [ BUCKET ]
    cmds:
      - |
        # if scoop bucket exists, remove it
        if [ -d "{{ .SCOOP_HOME }}/buckets/{{ .BUCKET }}" ]; then
          scoop bucket rm {{ .BUCKET }}
          if ! [ "{{ .UNATTENDED }}" = "true" ]; then
            {{ .gum_ok }} " ✅ Scoop bucket {{ .BUCKET }} has been removed successfully."
          fi
        fi
