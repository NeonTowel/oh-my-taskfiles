version: '3'

tasks:
  install:
    desc: '{{ default "" .HELP_PREFIX}}Install from GitHub latest release'
    requires:
      vars:
        - REPO
        - SEARCH_LINUX
        - SEARCH_DARWIN
        - SEARCH_WINDOWS
        - BINARY_LINUX
        - BINARY_DARWIN
        - BINARY_WINDOWS
        - BINARY_PATH
    vars:
      CACHE_DIR: '{{ printf "%s/.config/omt/cache" (env "HOME") }}'
      CACHE_ASSETS_DIR: '{{ printf "%s/assets" .CACHE_DIR }}'
      CACHE_REPO_NAME: '{{ .REPO | replace "/" "_" | replace ":" "_" | replace " " "_" }}'
      CACHE_FILE: '{{ printf "%s/releases_latest_%s.json" .CACHE_DIR .CACHE_REPO_NAME }}'
      CACHE_TTL: 86400
      RELEASES_LATEST_RAW:
        sh: |
          set -euo pipefail 2>/dev/null || set -euo
          cache_dir="{{ .CACHE_DIR }}"
          mkdir -p "$cache_dir"
          cache_file="{{ .CACHE_FILE }}"
          cache_ttl="{{ .CACHE_TTL }}"
          if [ -s "$cache_file" ]; then
            cache_mtime="$(date --utc --reference="$cache_file" +%s)"
            now_ts="$(date --utc +%s)"
            if [ $((now_ts - cache_mtime)) -lt "$cache_ttl" ]; then
              cat "$cache_file"
              exit 0
            fi
          fi
          response="$(curl -sSf "https://api.github.com/repos/{{ .REPO }}/releases/latest")"
          printf '%s' "$response" > "$cache_file"
          printf '%s' "$response"
      RELEASE:
        ref: 'fromJson .RELEASES_LATEST_RAW'
      FILE_NAME: '{{ default (list (base .REPO) "latest" | join "-") .FILE_NAME }}'
      RELEASE_PACKAGE: '{{ .FILE_NAME }}{{ if eq OS "windows" }}.zip{{ else }}.tar.gz{{ end }}'
      SPINNER: "{{ index .SPINNERS (randInt 0 (len .SPINNERS)) }}"
      WITTY_PHRASE: "{{ index .WITTY_PHRASES (randInt 0 (len .WITTY_PHRASES)) }}"
      GUM_SPIN: '{{ if (and .GUM_PRESENT (or (eq .GUM_SPINNER_ENABLED true) (eq .GUM_SPINNER_ENABLED nil))) }}gum spin --spinner {{ .SPINNER }} --title "{{ .WITTY_PHRASE }}" --show-stderr --show-stdout  -- {{ end }}'
      CONFIRM_OVERWRITE: '{{ if (and (eq .CONFIRM_OVERWRITE false) (ne .CONFIRM_OVERWRITE nil)) }} -y{{ end }}'
      EXECUTABLE: '{{ if eq OS "linux" }}{{ base .BINARY_LINUX }}{{ else if eq OS "darwin" }}{{ base .BINARY_DARWIN }}{{ else if eq OS "windows" }}{{ base .BINARY_WINDOWS }}{{ end }}'
    cmds:
      - |
        {{- range $index, $element := .RELEASE.assets }}
          {{- if (
            (and
              (has $element.content_type (list "application/octet-stream" "application/zip" "application/x-gtar"))
              (or
                (and (contains (lower $.SEARCH_WINDOWS) (lower $element.name)) (eq OS "windows"))
                (and (contains (lower $.SEARCH_DARWIN) (lower $element.name)) (eq OS "darwin"))
                (and (contains (lower $.SEARCH_LINUX) (lower $element.name)) (eq OS "linux"))
              )
            ))
        }}asset_url="{{ $element.browser_download_url }}"
        {{- end }}
        {{- end }}
        if [ -z "{{ .RELEASE.name }}" ]; then
          {{ .gum_error }} " ⚠️  Unable to find latest release! Aborting. "
          exit 1
        fi
        if [ -z "$asset_url" ]; then
          {{ .gum_error }} " ⚠️  Unable to find latest download url ({{ OS }})! Aborting. "
          exit 1
        fi
        {{- if .CLI_VERBOSE }}
        echo "Found release:"
        echo " - base: {{ base .REPO}}"
        echo " - name: {{ .RELEASE.name }}"
        echo " - asset_url: $asset_url"
        echo " - executable: {{ .EXECUTABLE }}"
        echo " - CACHE_DIR: {{ .CACHE_DIR }}"
        echo " - CACHE_ASSETS_DIR: {{ .CACHE_ASSETS_DIR }}"
        echo "Fetching $asset_url to assets cache..."
        {{- end }}
        mkdir -p {{ .BINARY_PATH }}
        mkdir -p {{ .CACHE_ASSETS_DIR }}
        {{ .GUM_SPIN }}curl -sL "$asset_url" -o "{{ .CACHE_ASSETS_DIR }}/{{ .RELEASE_PACKAGE }}"
        {{- if eq OS "windows" }}
        {{ .GUM_SPIN }}7z e "{{ .CACHE_ASSETS_DIR }}/{{ .RELEASE_PACKAGE }}" {{ .BINARY_WINDOWS }} -o"{{ .BINARY_PATH }}" -bd{{ .CONFIRM_OVERWRITE }}
        {{- else }}
        {{ .GUM_SPIN }}tar xfa "{{ .CACHE_ASSETS_DIR }}/{{ .RELEASE_PACKAGE }}" --strip-components=1 -C {{ .BINARY_PATH }} {{ if eq OS "linux" }}{{ .BINARY_LINUX }}{{ else if eq OS "darwin" }}{{ .BINARY_DARWIN }}{{ end }}
        {{- end }}
        if [ -f "{{ .CACHE_ASSETS_DIR }}/{{ .RELEASE_PACKAGE }}" ]; then
          rm "{{ .CACHE_ASSETS_DIR }}/{{ .RELEASE_PACKAGE }}"
        fi
        if [ -x "{{ .BINARY_PATH }}/{{ .EXECUTABLE }}" ]; then
          {{ .gum_ok }} " ✅  {{ base .REPO}} {{ .RELEASE.name }} installed successfully."
        else
          {{ .gum_error }} " ⚠️   File not found or not executable! ({{ .BINARY_PATH }}/{{ .EXECUTABLE }})"
        fi
