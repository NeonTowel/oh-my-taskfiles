version: '3'

includes:
  buckets:
    internal: true
    taskfile: scoop-buckets.yaml

tasks:
  install:
    platforms: [windows]
    internal: true
    vars:
      SCOOP_HOME: '{{ default (env "USERPROFILE") (env "HOME") | replace "\\" "/" }}/scoop'
    required:
      vars: [ APP ]
    cmds:
      - scoop install {{ .APP }} || true
      - if: 'test -d "{{ .SCOOP_HOME }}/apps/{{ .APP }}"'
        task: :install-success
        vars:
          APP: "{{ .APP }}"
    status:
      - test -d "{{ .SCOOP_HOME }}/apps/{{ .APP }}"

  neontowel-install:
    platforms: [windows]
    internal: true
    required:
      vars: [ APP ]
    cmds:
      - task: buckets:ensure
        vars: { BUCKET: "neontowel", BUCKET_URL: "https://github.com/NeonTowel/scoop-bucket"}
      - task: install
        vars: { APP: "{{ .APP }}" }

  extras-install:
    platforms: [windows]
    internal: true
    required:
      vars: [ APP ]
    cmds:
      - task: buckets:ensure
        vars: { BUCKET: "extras" }
      - task: install
        vars: { APP: "{{ .APP }}" }

  nonportable-install:
    platforms: [windows]
    internal: true
    required:
      vars: [ APP ]
    cmds:
      - task: buckets:ensure
        vars: { BUCKET: "nonportable" }
      - task: install
        vars: { APP: "{{ .APP }}" }

  nerd-fonts-install:
    platforms: [windows]
    internal: true
    required:
      vars: [ APP ]
    cmds:
      - task: buckets:ensure
        vars: { BUCKET: "nerd-fonts" }
      - task: install
        vars: { APP: "{{ .APP }}" }
