# Setup Awesome Windows Experience in one go :)
version: '3'

tasks:
  awesome-windows:
    deps: [ "tools:gum:install" ]
    internal: true
    platforms: [windows]
    vars:
      TOOLS:
        - 7zip
        - awesome-git
        - az
        - azd
        - bat
        - btop
        - coreutils
        - fonts
        - fzf
        - gcloud
        - glazewm
        - gomplate
        - gpg
        - gum
        - helix
        - jq
        - k8s
        - lsd
        - nvim
        - pwsh
        - rose-pine-cursor
        - starship
        - task
        - translucenttb
        - yasb
      APPS:
        - 1password
        - chatbox
        - cryptomator
        - opencode
        - proton-pass
        - rio
        - royal-ts
        - see-through-windows-ng
        - slack
        - vscodium
        - zed
      RUN:
        - git:config-global
        - lang:go:install
        - lang:rust:install
        - lang:node:install
      TOOLS_COUNT: "{{ len .TOOLS }}"
      APPS_COUNT: "{{ len .APPS }}"
      RUN_COUNT: "{{ len .RUN }}"
    cmds:
      - |
        cat <<EOF | gum format --type=markdown | gum style \
          --border double \
          --padding "1 2" \
          --width 70 \
          --align left \
          --border-foreground 212 \
          --foreground 44
        # ✨ Welcome to the Awesome Windows Experience! ✨

        ## 🔧 Tools to install

        | &nbsp;Name     | &nbsp;Name     | &nbsp;Name     |
        |----------------|----------------|----------------|
        {{- $cols := 3 -}}
        {{- $tools := .TOOLS -}}
        {{- $numRows := int (div (add (len $tools) (sub $cols 1)) $cols) -}}
        {{- range $row := until $numRows }}
        | {{- $idx0 := add $row (mul 0 $numRows) }}
          {{- if lt $idx0 (len $tools) }}&nbsp;{{ index $tools $idx0 }}&nbsp;{{ else }}   {{ end }} |
          {{- $idx1 := add $row (mul 1 $numRows) }}
          {{- if lt $idx1 (len $tools) }}&nbsp;{{ index $tools $idx1 }}&nbsp;{{ else }}   {{ end }} |
          {{- $idx2 := add $row (mul 2 $numRows) }}
          {{- if lt $idx2 (len $tools) }}&nbsp;{{ index $tools $idx2 }}&nbsp;{{ else }}   {{ end }} |
        {{- end }}

        ## 📦 Applications to install

        | &nbsp;Name     | &nbsp;Name     | &nbsp;Name     |
        |----------------|----------------|----------------|
        {{- $cols := 3 -}}
        {{- $apps := .APPS -}}
        {{- $numRows := int (div (add (len $apps) (sub $cols 1)) $cols) -}}
        {{- range $row := until $numRows }}
        | {{- $idx0 := add $row (mul 0 $numRows) }}
          {{- if lt $idx0 (len $apps) }}&nbsp;{{ index $apps $idx0 }}&nbsp;{{ else }}   {{ end }} |
          {{- $idx1 := add $row (mul 1 $numRows) }}
          {{- if lt $idx1 (len $apps) }}&nbsp;{{ index $apps $idx1 }}&nbsp;{{ else }}   {{ end }} |
          {{- $idx2 := add $row (mul 2 $numRows) }}
          {{- if lt $idx2 (len $apps) }}&nbsp;{{ index $apps $idx2 }}&nbsp;{{ else }}   {{ end }} |
        {{- end }}

        ## 📄 Additional OMT-configurations to run

        {{- range .RUN }}
        - {{ . }}
        {{- end }}

        ---
        🚀 *Press enter to embark on your legendary install quest...* 🚀

        EOF
        gum style --foreground 208 --align center --width 70 " "
        gum confirm --selected.background="#44d" --selected.foreground="#fff" "Are you sure you want to continue?"

      - for: { var: TOOLS }
        task: "awesome-install:tool"
        vars:
          TOOL: "{{ .ITEM }}"
          POS: "{{$item := .ITEM}}{{range $index, $element := .TOOLS}}{{ if eq $element $item }}{{ add $index 1 }}{{end}}{{end}}"
          MAX: "{{ .TOOLS_COUNT }}"
      - for: { var: APPS }
        task: "awesome-install:app"
        vars:
          APP: "{{ .ITEM }}"
          POS: "{{$item := .ITEM}}{{range $index, $element := .APPS}}{{ if eq $element $item }}{{ add $index 1 }}{{end}}{{end}}"
          MAX: "{{ .APPS_COUNT }}"

      - for: { var: RUN }
        task: "awesome-install:run"
        vars:
          RUN: "{{ .ITEM }}"
          POS: "{{$item := .ITEM}}{{range $index, $element := .RUN}}{{ if eq $element $item }}{{ add $index 1 }}{{end}}{{end}}"
          MAX: "{{ .RUN_COUNT }}"


  awesome-startup-app:
    internal: true
    requires:
      vars: [ APP, TARGET ]
    label: "awesome-install:run:{{ .RUN }}"
    cmds:
      - task: awesome-header
        vars:
          TITLE: "Adding Startup App:"
          NAME: "{{ .APP }} 📄"
          POS: "{{ .POS }}"
          MAX: "{{ .MAX }}"
      - defer: |
          {{if .EXIT_CODE}}
          gum style \
            --foreground 196 --border-foreground 196 --border double \
            --align center --width 50 --margin "1 2" --padding "2 4" \
            ' ❌ ERROR ' 'Execution of {{ .RUN }} failed with code {{.EXIT_CODE}}!'
          {{end}}
      - |
        pwsh -NoProfile -c Invoke-Command -scriptblock '{
        $ShortcutPath = "$env:APPDATA\Microsoft\Windows\Start Menu\Programs\Startup\{{ .APP }}.lnk"
        $TargetPath = "{{ .TARGET }}"
        "ShortcutPath: $ShortcutPath"
        "TargetPath: $TargetPath"
        $WshShell = New-Object -ComObject WScript.Shell
        $Shortcut = $WshShell.CreateShortcut($ShortcutPath)
        $Shortcut.TargetPath = $TargetPath
        $Shortcut.Save()
        }'

  awesome-windows:startup-apps:
    deps: [ "tools:gum:install" ]
    internal: true
    platforms: [windows]
    vars:
      SCOOP_PREFIX:
        sh: scoop prefix scoop
      SCOOP_HOME: '{{ osClean (list .SCOOP_PREFIX "../../../" | join "/")}}'
      APPS:
        - APP: Cryptomator
          TARGET: '{{ .SCOOP_HOME }}\apps\cryptomator\current\Cryptomator.exe'
        - APP: GlazeWM
          TARGET: '{{ .SCOOP_HOME }}\apps\glazewm\current\glazewm.exe'
        - APP: See Through Windows NG
          TARGET: '{{ .SCOOP_HOME }}\apps\see-through-windows-ng\current\see-through-windows-ng.exe'
        - APP: TranslucentTB
          TARGET: '{{ .SCOOP_HOME }}\apps\translucenttb\current\TranslucentTB.exe'
      APPS_COUNT: "{{ len .APPS }}"
    cmds:
      - for: { var: APPS }
        task: "awesome-startup-app"
        vars:
          APP: "{{ .ITEM.APP }}"
          PATH: "{{ .ITEM.PATH }}"
          TARGET: "{{ .ITEM.TARGET }}"
          POS: "{{$item := .ITEM}}{{range $index, $element := .APPS}}{{ if eq $element.APP $item.APP }}{{ add $index 1 }}{{end}}{{end}}"
          MAX: "{{ .APPS_COUNT }}"
