version: '3'

vars:
  NVM_VERSION: "0.40.4"

tasks:
  default:
    - task --list --taskfile languages/node.yaml

  install-nvm:linux:
    internal: true
    platforms: [linux]
    cmds:
      - |

  install:linux:
    internal: true
    platforms: [linux]
    cmds:
      - task: install-nvm:linux
      - |
        if [ ! -x "$HOME/.nvm/nvm.sh" ]; then
          curl -o- "https://raw.githubusercontent.com/nvm-sh/nvm/v{{ .NVM_VERSION }}/install.sh" | bash
          echo "nvm has been installed successfully."
        fi
        export NVM_DIR="$HOME/.nvm"
        source "$NVM_DIR/nvm.sh"
        nvm --version
        env|grep NVM
        nvm install -b --lts --default
        nvm use --lts
        nvm current

  install-nvm:windows:
    internal: true
    platforms: [windows]
    vars:
      APP_NAME: nvm
    cmds:
      - |
        if [ ! -d "$HOME/scoop/apps/{{ .APP_NAME }}/current" ]; then
          scoop install {{ .APP_NAME }}
          echo "{{ .APP_NAME }} has been installed successfully."
        fi

  install:windows:
    internal: true
    platforms: [windows]
    cmds:
      - task: install-nvm:windows
      - |
        if ! command -v nvm >/dev/null 2>&1; then
          echo "❌ ERROR: nvm is not installed"
          echo "Please install nvm first."
          exit 1
        fi
      - |
          nvm install --lts
          nvm use --lts
          nvm alias default node

  install:
    desc: "[NODE] ✨ Install node"
    cmds:
      - task: install:linux
        platforms: [linux]
      - task: install:windows
        platforms: [windows]
