version: "3"

tasks:
  default:
    - task --list --taskfile apps/zed.yaml

  # install
  install:windows:
    platforms: [windows]
    internal: true
    silent: true
    cmds:
      - task: ::scoop:install
        vars:
          APP: "zed"

  install:
    desc: "[ZED] ✨ Install Zed editor"
    silent: true
    cmds:
      - task: install:windows
        platforms: [windows]
      - task: configure

  # configure
  configure:windows:
    internal: true
    vars:
      CONFIG_FILE: "settings.json"
      CONFIG_SOURCE_PATH: "dotfiles/zed"
      CONFIG_DEST_PATH: "$HOME/AppData/Roaming/Zed"
      CONFIG_SOURCE_FILE: '{{ osClean (list .CONFIG_SOURCE_PATH .CONFIG_FILE | join "/")}}'
      CONFIG_DEST_FILE: '{{ osClean (list .CONFIG_DEST_PATH .CONFIG_FILE | join "/")}}'
    cmds:
      - |
        if [ ! -d "{{ .CONFIG_DEST_PATH }}" ]; then
          mkdir -p "{{ .CONFIG_DEST_PATH }}"
        fi
        {{ if .UNATTENDED }}
        {{ .gum_info }} "Unattended mode enabled, skipping interactive configuration."
        if [ ! -f "{{ .CONFIG_DEST_FILE }}" ]; then
          cp "{{ .CONFIG_SOURCE_FILE }}" "{{ .CONFIG_DEST_FILE }}"
          {{ .gum_ok }} "Configuration saved successfully."
        else
          {{ .gum_warn }} "Configuration already exist, skipping configuration."
        fi
        {{ else }}
        if [ -f "{{ .CONFIG_DEST_FILE }}" ]; then
          if ! gum confirm "Configuration already exist, overwrite?"; then
            {{ .gum_warn }} "Configuration already exist, skipping configuration."
            exit 0
          fi
        fi
        if gum confirm "Do you want to configure Zed to use Microsoft Foundry?"; then
          FOUNDRY_RESOURCE_NAME=$(gum input --placeholder "Enter your Microsoft Foundry Resource Name" --header "Microsoft Foundry Resource Name")
          EDIT_PREDICTIONS_MODEL=$(gum input --placeholder "Enter your Edit Predictions Model (f.ex. Codestral-2501)" --header "Edit Predictions Model")
          EDIT_PREDICTIONS_PROMPT_FORMAT=$(gum input --placeholder "Enter your Edit Predictions Prompt Format (f.ex. codestral)" --header "Edit Predictions Prompt Format")
          EDIT_PREDICTIONS_API_URL=$(gum input --placeholder "Enter your Edit Predictions API URL (f.ex. https://<serverless-endpoint>.<region>.models.ai.azure.com/v2/fim/completions)" --header "Edit Predictions FIM API URL")
          export FOUNDRY_RESOURCE_NAME="$FOUNDRY_RESOURCE_NAME"
          export EDIT_PREDICTIONS_MODEL="$EDIT_PREDICTIONS_MODEL"
          export EDIT_PREDICTIONS_PROMPT_FORMAT="$EDIT_PREDICTIONS_PROMPT_FORMAT"
          export EDIT_PREDICTIONS_API_URL="$EDIT_PREDICTIONS_API_URL"
          gomplate -f "{{ .CONFIG_SOURCE_FILE }}.tmpl" -o "{{ .CONFIG_DEST_FILE }}"
          {{ .gum_info }} " Remember to set these environment variables to your Foundry API KEY:"
          {{ .gum_info }} "  - ZED_OPEN_AI_COMPATIBLE_EDIT_PREDICTION_API_KEY"
          {{ .gum_info }} "  - FOUNDRY_CHAT_API_KEY"
          {{ .gum_info }} "  - FOUNDRY_RESPONSES_API_KEY"
        else
          cp "{{ .CONFIG_SOURCE_FILE }}" "{{ .CONFIG_DEST_FILE }}"
        fi
        {{ .gum_ok }} "Configuration saved successfully."
        {{ end }}

  configure:
    desc: "[ZED] ⚙️  Configure Zed editor"
    silent: true
    cmds:
      - task: configure:windows
