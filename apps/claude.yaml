version: "3"

tasks:
  default:
    - task --list --taskfile apps/claude.yaml

  install:linux:
    internal: true
    platforms: [linux]
    cmds:
      - |
        if ! command -v claude >/dev/null 2>&1; then
          echo "Installing Claude..."
          curl -fsSL https://claude.ai/install.sh | bash
        fi

  install:windows:
    internal: true
    platforms: [windows]
    cmds:
      - task: ::winget:install
        vars:
          APP: "Anthropic.Claude"
      - task: ::winget:install
        vars:
          APP: "Anthropic.ClaudeCode"

  configure:windows:
    internal: true
    silent: true
    platforms: [windows]
    deps: ["::tools:gomplate:install"]
    cmds:
      - |
        if [ ! -d "$HOME/.claude" ]; then
          mkdir -p "$HOME/.claude"
        fi
        {{ if .UNATTENDED }}
        {{ .gum_info }} "Unattended mode enabled, skipping interactive configuration."
        if [ ! -f "$HOME/.claude/settings.json" ]; then
          #cp "dotfiles/claude/settings.default.json" "$HOME/.claude/settings.json"
          {{ .gum_ok }} "Claude settings have been configured successfully."
        else
          {{ .gum_warn }} "Claude settings already exist, skipping configuration."
        fi
        {{ else }}
        if [ -f "$HOME/.claude/settings.json" ]; then
          if ! gum confirm "Claude settings already exist, overwrite?"; then
            {{ .gum_warn }} "Claude settings already exist, skipping configuration."
            exit 0
          fi
        fi

        if gum confirm "Do you want to configure claude to use Microsoft Foundry?"; then
          ANTHROPIC_FOUNDRY_RESOURCE=$(gum input --placeholder "Enter your Microsoft Foundry Resource Name" --header "Microsoft Foundry Resource Name")
          ANTHROPIC_FOUNDRY_API_KEY=$(gum input --placeholder "Enter your Microsoft Foundry Claude Model API Key" --header "Microsoft Foundry Claude Model API Key")
          CLAUDE_CODE_USE_FOUNDRY="1"
        fi

        # try to find git bash path
        if [ ! -z "$CLAUDE_CODE_GIT_BASH_PATH" ] && [ -f "$CLAUDE_CODE_GIT_BASH_PATH" ]; then
          CLAUDE_CODE_GIT_BASH_PATH="$CLAUDE_CODE_GIT_BASH_PATH"
        fi

        # if not found, try to find in filesystem
        if [ -z "$CLAUDE_CODE_GIT_BASH_PATH" ]; then
          if [ -f "C:\\Program Files\\Git\\bin\\bash.exe" ]; then
            CLAUDE_CODE_GIT_BASH_PATH="C:\\\\Program Files\\\\Git\\\\bin\\\\bash.exe"
          elif [ -f "$HOME\\scoop\\shims\\bash.exe" ]; then
            CLAUDE_CODE_GIT_BASH_PATH="$HOME\\\\scoop\\\\shims\\\\bash.exe"
          else
            {{ .gum_warn }} "Warning: Git Bash path not found, Claude might not work properly."
          fi
        fi
        export ANTHROPIC_FOUNDRY_RESOURCE="$ANTHROPIC_FOUNDRY_RESOURCE"
        export ANTHROPIC_FOUNDRY_API_KEY="$ANTHROPIC_FOUNDRY_API_KEY"
        export CLAUDE_CODE_GIT_BASH_PATH="$CLAUDE_CODE_GIT_BASH_PATH"
        export CLAUDE_CODE_USE_FOUNDRY="$CLAUDE_CODE_USE_FOUNDRY"
        gomplate -f "dotfiles/claude/settings.json.tmpl" -o "$HOME/.claude/settings.json"
        {{ .gum_ok }} "Claude settings have been configured successfully."
        {{ end }}

  configure:linux:
    internal: true
    silent: true
    platforms: [linux]
    deps: ["::tools:gomplate:install"]
    cmds:
      - |
        if [ ! -d "$HOME/.claude" ]; then
          mkdir -p "$HOME/.claude"
        fi
        {{ if .UNATTENDED }}
        {{ .gum_info }} "Unattended mode enabled, skipping interactive configuration."
        if [ ! -f "$HOME/.claude/settings.json" ]; then
          #cp "dotfiles/claude/settings.default.json" "$HOME/.claude/settings.json"
          {{ .gum_ok }} "Claude settings have been configured successfully."
        else
          {{ .gum_warn }} "Claude settings already exist, skipping configuration."
        fi
        {{ else }}
        if [ -f "$HOME/.claude/settings.json" ]; then
          if ! gum confirm "Claude settings already exist, overwrite?"; then
            {{ .gum_warn }} "Claude settings already exist, skipping configuration."
            exit 0
          fi
        fi

        if gum confirm "Do you want to configure claude to use Microsoft Foundry?"; then
          ANTHROPIC_FOUNDRY_RESOURCE=$(gum input --placeholder "Enter your Microsoft Foundry Resource Name" --header "Microsoft Foundry Resource Name")
          ANTHROPIC_FOUNDRY_API_KEY=$(gum input --placeholder "Enter your Microsoft Foundry Claude Model API Key" --header "Microsoft Foundry Claude Model API Key")
          CLAUDE_CODE_USE_FOUNDRY="1"
        fi

        # try to find git bash path
        if [ ! -z "$CLAUDE_CODE_GIT_BASH_PATH" ] && [ -x "$CLAUDE_CODE_GIT_BASH_PATH" ]; then
          CLAUDE_CODE_GIT_BASH_PATH="$CLAUDE_CODE_GIT_BASH_PATH"
        fi

        # if not found, try to find in filesystem
        if [ -z "$CLAUDE_CODE_GIT_BASH_PATH" ]; then
          if [ -x $(which bash) ]; then
            CLAUDE_CODE_GIT_BASH_PATH="$(which bash)"
          else
            {{ .gum_warn }} "Warning: Git Bash path not found, Claude might not work properly."
          fi
        fi
        export ANTHROPIC_FOUNDRY_RESOURCE="$ANTHROPIC_FOUNDRY_RESOURCE"
        export ANTHROPIC_FOUNDRY_API_KEY="$ANTHROPIC_FOUNDRY_API_KEY"
        export CLAUDE_CODE_GIT_BASH_PATH="$CLAUDE_CODE_GIT_BASH_PATH"
        export CLAUDE_CODE_USE_FOUNDRY="$CLAUDE_CODE_USE_FOUNDRY"
        gomplate -f "dotfiles/claude/settings.json.tmpl" -o "$HOME/.claude/settings.json"
        {{ .gum_ok }} "Claude settings have been configured successfully."
        {{ end }}
      - task: agents
      - task: mcp

  agents:
    desc: "[CLAUDE] Configure Claude agents (and skills)"
    silent: true
    vars:
      CONFIG_SOURCE_PATH: "dotfiles/claude"
      CONFIG_DEST_PATH: "$HOME/.claude"
    dir: "{{ .CONFIG_SOURCE_PATH }}"
    sources:
      - agents/*.md
      - skills/*.md
      - shared/*.md
      - AGENTS.md
    method: none
    cmds:
      - |-
        if [ ! -d "{{ .CONFIG_DEST_PATH }}" ]; then
          mkdir -p "{{ .CONFIG_DEST_PATH }}"
        fi
      - for: sources
        cmd: |-
          {{- $dest_path:=osDir .ITEM }}
          {{- if ne $dest_path "opencode" -}}
          mkdir -p "{{ joinPath .CONFIG_DEST_PATH $dest_path }}"
          {{- end }}
          cp "{{ .ITEM }}" "{{joinPath .CONFIG_DEST_PATH .ITEM }}"
      - echo "Agents configuration saved successfully."

  mcp:
    desc: "[CLAUDE] Configure Claude MCP servers"
    silent: true
    vars:
      SERVERS:
        - name: gh_grep
          scope: user
          transport: http
          url: https://mcp.grep.app
        - name: exa
          scope: user
          transport: http
          url: https://mcp.exa.ai/mcp
          headers:
            - 'X-Api-Key: \${EXA_API_KEY}'
        - name: context7
          scope: user
          transport: http
          url: https://mcp.context7.com/mcp
          headers:
            - 'CONTEXT7_API_KEY: \${CONTEXT7_API_KEY}'
      REPLACE: '{{ eq .REPLACE "true" }}'
    preconditions:
      - sh: command -v claude >/dev/null 2>&1
        msg: "'claude' must be installed first"
    cmds:
      - defer: |
          {{if .EXIT_CODE}}
          gum style \
            --foreground 196 --border-foreground 196 --border double \
            --align center --width 50 --margin "1 2" --padding "2 4" \
            ' ❌ ERROR ' 'Failed to add Claude MCP servers!'
          {{end}}
      - for: { var: SERVERS, as: SERVER }
        cmd: |
            {{- if eq .REPLACE "true" -}}
            if claude mcp get {{ .SERVER.name }} >/dev/null 2&>1; then
              {{ .gum_warn }} "{{ .SERVER.name }} already exists, replacing..."
              claude mcp remove {{ .SERVER.name }}
            {{- else -}}
            if claude mcp get {{ .SERVER.name }} >/dev/null 2&>1; then
              {{ .gum_warn }} "{{ .SERVER.name }} already exists, skipping..."
            else
            {{- end }}
              claude mcp add \
                --transport {{ .SERVER.transport }} \
                {{ .SERVER.name }}
                {{- if (eq .SERVER.transport "http") }} \
                {{ .SERVER.url }}
                {{- end }}
                {{- if .SERVER.headers }} \
                {{- range $i, $header := .SERVER.headers }}
                --header "{{ $header }}"{{ if (lt (add $i 1) (len $.SERVER.headers)) }} \{{ end }}
                {{- end }}
                {{- end }}
                {{- if .SERVER.scope }} \
                --scope {{ .SERVER.scope }}
                {{- end }}
                {{ .gum_info }} "{{ .SERVER.name }} added."
            fi
      - '{{ .gum_ok }} "Claude MCP servers configured."'

  install:darwin:
    - echo "Not implemented yet."

  configure:darwin:
    - echo "Not implemented yet."

  install:
    desc: "[CLAUDE] ✨ Install Claude"
    silent: true
    cmds:
      - task: "install:{{ OS }}"
      - task: "configure:{{ OS }}"
