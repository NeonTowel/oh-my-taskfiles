version: "3"

includes:
  github:
    taskfile: ../lib/github-v2.yaml
    flatten: true
    vars:
      HELP_PREFIX: "[GLOW] ✨  "
      REPO: charmbracelet/glow
      DOWNLOAD_LINUX: 'glow_%s_Linux_x86_64.tar.gz'
      DOWNLOAD_DARWIN: 'glow_%s_Darwin_x86_64.tar.gz'
      DOWNLOAD_WINDOWS: 'glow_%s_Windows_x86_64.zip'
      BINARY_LINUX: '**/glow'
      BINARY_DARWIN: '**/glow'
      BINARY_WINDOWS: '**/glow.exe'
      BINARY_PATH: '$HOME/bin'

tasks:
  default:
    - task --list --taskfile tools/glow.yaml
