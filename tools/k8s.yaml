version: '3'

includes:
  kubecm:
    taskfile: ../lib/github-v2.yaml
    internal: true
    vars:
      HELP_PREFIX: "[KUBECM] ✨  "
      REPO: sunny0826/kubecm
      BINARY_LINUX: '**/kubecm'
      BINARY_DARWIN: '**/kubecm'
      BINARY_WINDOWS: '**/kubecm.exe'
      BINARY_PATH: '$HOME/bin'

  kubectx:
    taskfile: ../lib/github-v2.yaml
    internal: true
    vars:
      HELP_PREFIX: "[KUBECTX] ✨  "
      REPO: ahmetb/kubectx
      SELECT_ASSET: 'kubectx*'
      BINARY_LINUX: '**/kubectx'
      BINARY_DARWIN: '**/kubectx'
      BINARY_WINDOWS: '**/kubectx.exe'
      BINARY_PATH: '$HOME/bin'

  kubens:
    taskfile: ../lib/github-v2.yaml
    internal: true
    vars:
      HELP_PREFIX: "[KUBENS] ✨  "
      REPO: ahmetb/kubectx
      SELECT_ASSET: 'kubens*'
      BINARY_LINUX: '**/kubens'
      BINARY_DARWIN: '**/kubens'
      BINARY_WINDOWS: '**/kubens.exe'
      BINARY_PATH: '$HOME/bin'

tasks:
  default:
    - task --list --taskfile tools/k8s.yaml

  install:windows:
    platforms: [windows]
    internal: true
    silent: true
    cmds:
      - task: ::scoop:buckets:add
        vars:
          BUCKET: lemon
          BUCKET_URL: https://github.com/hoilc/scoop-lemon
      - task: ::scoop:install
        vars:
          APP: kubecm
      - task: ::scoop:install
        vars:
          APP: kubectx
      - task: ::scoop:install
        vars:
          APP: kubens
      - task: ::scoop:install
        vars:
          APP: kubectl
      - task: ::scoop:install
        vars:
          APP: helm

  install:linux:
    platforms: [linux]
    internal: true
    silent: true
    cmds:
      - task: kubecm:install
      - task: kubectx:install
      - task: kubens:install
      - task: kubectl:install
      - task: helm:install

  install:
    desc: "[K8S] ✨ Install Kubernetes tools (kubecm, kubectx, kubens, kubectl and helm)"
    cmds:
      - task: install:windows
        platforms: [windows]
      - task: install:linux
        platforms: [linux]

  ############################################################

  kubectl:install:
    internal: true
    platforms: [linux]
    cmds:
      - |
        if ! command -v kubectl >/dev/null 2>&1; then
          {{ .gum_spin }}curl -sL "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl" -o ~/bin/kubectl
          chmod +x ~/bin/kubectl
          {{ .gum_ok }} " ✅  kubectl has been installed successfully."
        fi

  helm:install:
    internal: true
    platforms: [linux]
    deps: [ '::tools:jq:install' ]
    cmds:
      - |
        if ! command -v helm >/dev/null 2>&1; then
          version=$(curl -sSf https://api.github.com/repos/helm/helm/releases/latest | jq -r '.tag_name')
          {{ .gum_spin }}curl -sL "https://get.helm.sh/helm-${version}-linux-amd64.tar.gz" | tar xz --strip-components=1 --overwrite -C ~/bin "**/helm"
          chmod +x ~/bin/helm
          {{ .gum_ok }} " ✅  helm installed successfully."
        fi
