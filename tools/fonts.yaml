version: '3'

tasks:
  default:
    - task --list --taskfile tools/fonts.yaml

  install-font:
    internal: true
    platforms: [windows]
    requires:
      vars: [ font ]
    cmds:
      - task: ::scoop:nerd-fonts-install
        vars:
          APP: "{{ .font }}"

  install-font:linux:
    internal: true
    platforms: [linux]
    requires:
      vars: [ FONT_FILE ]
    vars:
      FONTS_DIR: "$HOME/.local/share/fonts"
      FONTS_REPO: ryanoasis/nerd-fonts
      GH_AUTH_TOKEN_YAML:
        sh: |
          if [ -f ~/.config/gh/hosts.yml ]; then
            grep oauth_token ~/.config/gh/hosts.yml | head -n 1 | xargs
          else
            echo ""
          fi
      GH_AUTH_TOKEN:
        ref: 'fromYaml .GH_AUTH_TOKEN_YAML'
    cmds:
      - |
        if [ ! -d "{{ .FONTS_DIR }}" ]; then
          mkdir -p {{ .FONTS_DIR }}
        fi
        {{- if (and
          .GH_AUTH_TOKEN
          (gt (len .GH_AUTH_TOKEN) 0)
          (hasKey .GH_AUTH_TOKEN "oauth_token")
         ) }}
        export DRA_GITHUB_TOKEN="{{ .GH_AUTH_TOKEN.oauth_token }}"
        {{- end }}
        dra download --select "{{ .FONT_FILE }}" --output /tmp {{ .FONTS_REPO }}
        tar xf /tmp/{{ .FONT_FILE }} -C {{ .FONTS_DIR }} "*.ttf"
        rm -f /tmp/{{ .FONT_FILE }}
      - cmd: sleep $SLEEP
        if: '[ ! -z "$SLEEP" ]'

  install:windows:
    internal: true
    platforms: [windows]
    vars:
      FONTS:
        - Mononoki-NF
        - Mononoki-NF-Mono
        - FantasqueSansMono-NF
        - FantasqueSansMono-NF-Mono
        - JetBrainsMono-NF
        - JetBrainsMono-NF-Mono
        - Lato
    cmds:
      - for: { var: FONTS }
        task: install-font
        vars:
          font: "{{.ITEM}}"

  dra:present:
    platforms: [linux]
    internal: true
    status:
      - command -v dra
    cmds:
      - task: ::tools:dra:install

  install:linux:
    deps: [ dra:present ]
    internal: true
    platforms: [linux]
    vars:
      FONTS:
        - Mononoki.tar.xz
        - FantasqueSansMono.tar.xz
        - JetBrainsMono.tar.xz
        - Meslo.tar.xz
        - Cousine.tar.xz
        - Agave.tar.xz
        - MartianMono.tar.xz
        - Lekton.tar.xz
        - Noto.tar.xz
        - RobotoMono.tar.xz
        - SpaceMono.tar.xz
        - SourceCodePro.tar.xz
        - VictorMono.tar.xz
        - ZedMono.tar.xz
    cmds:
      - for: { var: FONTS }
        task: install-font:linux
        vars:
          FONT_FILE: "{{.ITEM}}"
      - fc-cache -fv

  install:
    silent: true
    desc: "[FONTS] ✨ Install fonts"
    cmds:
      - task: install:windows
      - task: install:linux
