version: '3'

tasks:
  default:
    - task --list --taskfile tools/fonts.yaml

  install-font:
    internal: true
    platforms: [windows]
    requires:
      vars: [ font ]
    cmds:
      - task: ::scoop:nerd-fonts-install
        vars:
          APP: "{{ .font }}"

  install:windows:
    internal: true
    platforms: [windows]
    vars:
      FONTS:
        - Mononoki-NF
        - Mononoki-NF-Mono
        - FantasqueSansMono-NF
        - FantasqueSansMono-NF-Mono
        - JetBrainsMono-NF
        - JetBrainsMono-NF-Mono
        - Lato
    cmds:
      - for: { var: FONTS }
        task: install-font
        vars:
          font: "{{.ITEM}}"

  dra:present:
    platforms: [linux]
    internal: true
    status:
      - command -v dra
    cmds:
      - task: ::tools:dra:install

  install:linux:
    deps: [ '::tools:jq:install' ]
    internal: true
    platforms: [linux]
    vars:
      FONTS:
        - Mononoki.tar.xz
        - FantasqueSansMono.tar.xz
        - JetBrainsMono.tar.xz
        - Meslo.tar.xz
        - Cousine.tar.xz
        - Agave.tar.xz
        - MartianMono.tar.xz
        - Lekton.tar.xz
        - Noto.tar.xz
        - RobotoMono.tar.xz
        - SpaceMono.tar.xz
        - SourceCodePro.tar.xz
        - VictorMono.tar.xz
        - ZedMono.tar.xz
      FONTS_DIR: "$HOME/.local/share/fonts"
      REPO: ryanoasis/nerd-fonts
    cmds:
      - |
        version=$({{ printf .gum_spin_title "Fetching latest release tag..." }}bash -c "
          curl -sSf https://api.github.com/repos/{{ .REPO }}/releases/latest | jq -r '.tag_name'
        ")
        echo "Version: $version"
        if [[ ! "$version" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          {{ .gum_warn }} "⚠️  Warning: unambigious version ($version), downloads may fail!"
        fi
        {{ printf .gum_spin_title "Downloading fonts..." }}bash -c "
        {{- range .FONTS }}
          curl -sL https://github.com/ryanoasis/nerd-fonts/releases/download/${version}/{{ . }} | tar -xJf - --overwrite -C {{ expandenv $.FONTS_DIR }} --wildcards '*.ttf'
        {{- end }}
        "
        #{{ printf .gum_spin_title "Reloading font cache..." }}fc-cache -fv
        {{ .gum_ok }} " ✅  fonts installed successfully."

  install:
    silent: true
    desc: "[FONTS] ✨ Install fonts"
    cmds:
      - task: install:windows
      - task: install:linux
