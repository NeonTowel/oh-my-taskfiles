version: "3"

includes:
  github:
    taskfile: ../lib/github-v2.yaml
    flatten: true
    vars:
      HELP_PREFIX: "[GITHUB-CLI] ✨  "
      REPO: cli/cli
      DOWNLOAD_LINUX: 'GitHub CLI %s linux amd64'
      DOWNLOAD_DARWIN: 'GitHub CLI %s macOS universal'
      DOWNLOAD_WINDOWS: 'GitHub CLI %s windows amd64'
      BINARY_RELEASE: true
      BINARY_LINUX: '**/gh'
      BINARY_DARWIN: '**/gh'
      BINARY_WINDOWS: '**/gh.exe'
      BINARY_PATH: '$HOME/bin'

tasks:
  default:
    - task --list --taskfile tools/github.yaml
