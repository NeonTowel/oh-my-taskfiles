version: "3"

includes:
  github:
    taskfile: ../lib/github-v2.yaml
    flatten: true
    vars:
      HELP_PREFIX: "[GITHUB-CLI] ✨  "
      REPO: cli/cli
      DOWNLOAD_LINUX: 'gh_%s_linux_amd64.tar.gz'
      DOWNLOAD_DARWIN: 'gh_%s_macOS_amd64.zip'
      DOWNLOAD_WINDOWS: 'gh_%s_windows_amd64.zip'
      TAR_HAS_SUBFOLDER: true
      TAR_STRIP_COMPONENTS: 2
      BINARY_LINUX: '**/gh'
      BINARY_DARWIN: '**/gh'
      BINARY_WINDOWS: '**/gh.exe'
      BINARY_PATH: '$HOME/bin'

tasks:
  default:
    - task --list --taskfile tools/github.yaml
