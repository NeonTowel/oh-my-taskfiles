version: "3"

includes:
  github:
    taskfile: ../lib/github.yaml
    flatten: true
    vars:
      HELP_PREFIX: "[DRA] ✨  "
      REPO: devmatteini/dra
      SEARCH_LINUX: 'x86_64-unknown-linux-gnu.tar.gz'
      SEARCH_DARWIN: 'x86_64-apple-darwin.tar.gz'
      SEARCH_WINDOWS: 'x86_64-pc-windows-msvc.zip'
      BINARY_LINUX: '**/dra'
      BINARY_DARWIN: '**/dra'
      BINARY_WINDOWS: '**/dra.exe'
      BINARY_PATH: '$HOME/bin'

tasks:
  default:
    - task --list --taskfile tools/dra.yaml
