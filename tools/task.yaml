version: '3'

includes:
  github:
    taskfile: ../lib/github-v2.yaml
    flatten: true
    vars:
      HELP_PREFIX: "[GO-TASK] ✨  "
      REPO: go-task/task
      DOWNLOAD_LINUX: 'task_linux_amd64.tar.gz'
      DOWNLOAD_DARWIN: 'task_darwin_amd64.tar.gz'
      DOWNLOAD_WINDOWS: 'task_windows_386.zip'
      TAR_HAS_SUBFOLDER: false
      BINARY_LINUX: '**/task'
      BINARY_DARWIN: '**/task'
      BINARY_WINDOWS: '**/task.exe'
      BINARY_PATH: '$HOME/bin'

tasks:
  default:
    - task --list --taskfile tools/task.yaml
