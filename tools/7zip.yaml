version: '3'

includes:
  linux:
    taskfile: ../lib/github-v2.yaml
    flatten: false
    internal: true
    vars:
      REPO: ip7z/7zip
      DOWNLOAD_LINUX: '7z%z-linux-x64.tar.xz'
      DOWNLOAD_DARWIN: '7z%z-mac.tar.xz'
      TAR_HAS_SUBFOLDER: false
      DOWNLOAD_WINDOWS: ''
      BINARY_LINUX: '7zz'
      BINARY_DARWIN: '7zz'
      BINARY_WINDOWS: ''
      BINARY_PATH: '$HOME/bin'

tasks:
  default:
    - task --list --taskfile tools/7zip.yaml

  install:windows:
    platforms: [windows]
    internal: true
    silent: true
    cmds:
      - task: ::scoop:install
        vars:
          APP: 7zip

  install:linux:
    platforms: [linux]
    internal: true
    silent: true
    cmds:
      - task: linux:install

  install:
    desc: "[7ZIP] ✨ Install 7zip"
    silent: true
    cmds:
      - task: install:windows
      - task: install:linux
